openapi: 3.0.3
info:
  title: Mango Parental Control Service API
  version: 1.0.0
  description: Internal API contract for Mango Parental Control Service. The service intentionally standardizes successful create, update, and delete operations on `200 OK`.
servers:
  - url: https://{host}:{publicPort}/api/v1
    description: Public HTTP API Interface
    variables:
      host:
        default: localhost
      publicPort:
        default: '16010'
  - url: https://{host}:{privatePort}/api/v1
    description: Private/Internal HTTP API Interface
    variables:
      host:
        default: localhost
      privatePort:
        default: '17010'
security:
  - bearerAuth: []
  - PrivateInternalNameAuth: []
    PrivateApiKeyAuth: []
paths:
  /livez:
    get:
      summary: Liveness probe
      description: Checks if the service is running and healthy. This route is unauthenticated and accessible on both the public and private ports.
      security: []
      responses:
        '200':
          description: Service is healthy and running
        '500':
          description: Service is unhealthy
  /system:
    get:
      summary: Retrieve system diagnostics and metrics
      description: Returns system status info or resource usage based on the requested command.
      security:
        - PrivateInternalNameAuth: []
          PrivateApiKeyAuth: []
      parameters:
        - name: command
          in: query
          required: true
          schema:
            type: string
            enum:
              - info
              - resources
      responses:
        '200':
          description: Successful query execution
        '400':
          description: Invalid command query
    post:
      summary: Modify log levels or query diagnostics schema
      description: Dynamically mutate runtime subsystem log levels or fetch subsystem metadata.
      security:
        - PrivateInternalNameAuth: []
          PrivateApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - command
              properties:
                command:
                  type: string
                  enum:
                    - setloglevel
                    - getloglevels
                    - getloglevelnames
                    - getsubsystemnames
                subsystems:
                  type: array
                  items:
                    type: object
                    required:
                      - tag
                      - value
                    properties:
                      tag:
                        type: string
                      value:
                        type: string
      responses:
        '200':
          description: Successful action execution
        '400':
          description: Invalid command or malformed body
  /subscribers/{subscriber_id}/groups: null
  get: null
  summary: Unlink schedule from group
  parameters:
    - $ref: '#/components/parameters/SubscriberIdPath'
    - $ref: '#/components/parameters/GroupIdPath'
    - $ref: '#/components/parameters/ScheduleIdPath'
  responses: null
  '200': null
  description: Group schedule link removed
  content: null
  application/json: null
  schema: null
  type: array
  items: null
  $ref: '#/components/schemas/ConfigRawResponse'
  '400':
    $ref: '#/components/responses/BadRequest'
  '401':
    $ref: '#/components/responses/Unauthorized'
  '500':
    $ref: '#/components/responses/StorageFailure'
  post: null
  requestBody: null
  required: true
  '409':
    $ref: '#/components/responses/Conflict'
  /subscribers/{subscriber_id}/groups/{group_id}: null
  '404':
    $ref: '#/components/responses/NotFound'
  put: null
  delete: null
  /subscribers/{subscriber_id}/groups/{group_id}/devices: null
  /subscribers/{subscriber_id}/groups/{group_id}/devices/{client_mac}: null
  /subscribers/{subscriber_id}/schedules: null
  /subscribers/{subscriber_id}/schedules/{schedule_id}: null
  /subscribers/{subscriber_id}/groups/{group_id}/schedules: null
  /subscribers/{subscriber_id}/groups/{group_id}/schedules/{schedule_id}: null
