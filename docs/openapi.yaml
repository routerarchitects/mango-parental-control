openapi: 3.0.0
info:
  title: "mango-parental-control API"
  version: "1.0.0"
  description: |
    REST API definition for mango-parental-control microservice.
    
    ### Dual-Port HTTP Architecture
    The microservice operates two isolated HTTP interfaces:
    1. **Public Port (default: 8088)**: Exposes business-level API endpoints (such as `/api/v1/items`).
       * Authentication: Enabled by default, uses public/private token validation via OpenWiFi Security service.
    2. **Private Port (default: 17007)**: Exposes internal administration, metrics, and diagnostics.
       * Authentication: Requires both `X-INTERNAL-NAME` and `X-API-KEY` headers.
    
    Both ports serve the unauthenticated health endpoint `/livez`.
servers:
  - url: "https://{host}:{publicPort}"
    description: "Public HTTP API Interface"
    variables:
      host:
        default: "localhost"
        description: "Hostname/IP of the public service"
      publicPort:
        default: "8088"
        description: "Public API interface port"
  - url: "https://{host}:{privatePort}"
    description: "Private/Internal HTTP API Interface"
    variables:
      host:
        default: "localhost"
        description: "Hostname/IP of the private service"
      privatePort:
        default: "17007"
        description: "Private management/diagnostics port"
security:
  - PublicTokenAuth: []
  - PrivateInternalNameAuth: []
    PrivateApiKeyAuth: []
paths:
  /livez:
    get:
      summary: "Liveness probe"
      description: "Checks if the service is running and healthy. This route is unauthenticated and accessible on both the public and private ports."
      security: []
      responses:
        "200":
          description: "Service is healthy and running"
        "500":
          description: "Service is unhealthy"

  /api/v1/system:
    get:
      summary: "Retrieve system diagnostics and metrics"
      description: "Returns system status info or resource usage based on the requested command."
      parameters:
        - name: "command"
          in: "query"
          required: true
          schema:
            type: "string"
            enum: ["info", "resources"]
      responses:
        "200":
          description: "Successful query execution"
        "400":
          description: "Invalid command query"
    post:
      summary: "Modify log levels or query diagnostics schema"
      description: "Dynamically mutate runtime subsystem log levels or fetch subsystem metadata."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: "object"
              required:
                - "command"
              properties:
                command:
                  type: "string"
                  enum: ["setloglevel", "getloglevels", "getloglevelnames", "getsubsystemnames"]
                subsystems:
                  type: "array"
                  items:
                    type: "object"
                    required:
                      - "tag"
                      - "value"
                    properties:
                      tag:
                        type: "string"
                      value:
                        type: "string"
      responses:
        "200":
          description: "Successful action execution"
        "400":
          description: "Invalid command or malformed body"

  /api/v1/items:
    servers:
      - url: "https://{host}:{publicPort}"
        description: "Public HTTP API Interface"
    security:
      - PublicTokenAuth: []
    get:
      summary: "List all items"
      responses:
        "200":
          description: "Successful response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemListResponse"
    post:
      summary: "Create a new item"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateItemRequest"
      responses:
        "201":
          description: "Item successfully created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponse"
        "400":
          description: "Invalid input"

  /api/v1/items/{id}:
    servers:
      - url: "https://{host}:{publicPort}"
        description: "Public HTTP API Interface"
    security:
      - PublicTokenAuth: []
    get:
      summary: "Get an item by ID"
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: "string"
            format: "uuid"
      responses:
        "200":
          description: "Successful response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponse"
        "404":
          description: "Item not found"
    put:
      summary: "Update an existing item"
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: "string"
            format: "uuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateItemRequest"
      responses:
        "200":
          description: "Item updated successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponse"
        "404":
          description: "Item not found"
    delete:
      summary: "Delete an item"
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: "string"
            format: "uuid"
      responses:
        "204":
          description: "Item successfully deleted"
        "404":
          description: "Item not found"

components:
  securitySchemes:
    PublicTokenAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Bearer authentication token for Public API interface endpoints."
    PrivateInternalNameAuth:
      type: apiKey
      in: header
      name: X-INTERNAL-NAME
      description: "Internal identifier header required on the Private API interface."
    PrivateApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY
      description: "API Key authorization header required on the Private API interface."
  schemas:
    SampleItem:
      type: "object"
      required:
        - "id"
        - "name"
        - "description"
        - "createdAt"
        - "updatedAt"
      properties:
        id:
          type: "string"
          format: "uuid"
        name:
          type: "string"
        description:
          type: "string"
        createdAt:
          type: "string"
          format: "date-time"
        updatedAt:
          type: "string"
          format: "date-time"
    CreateItemRequest:
      type: "object"
      required:
        - "name"
      properties:
        name:
          type: "string"
          minLength: 2
          maxLength: 255
        description:
          type: "string"
          maxLength: 1000
    UpdateItemRequest:
      type: "object"
      properties:
        name:
          type: "string"
          minLength: 2
          maxLength: 255
        description:
          type: "string"
          maxLength: 1000
    ItemResponse:
      type: "object"
      properties:
        data:
          $ref: "#/components/schemas/SampleItem"
    ItemListResponse:
      type: "object"
      properties:
        data:
          type: "array"
          items:
            $ref: "#/components/schemas/SampleItem"
