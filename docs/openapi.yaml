openapi: 3.0.3
info:
  title: Mango Parental Control Service API
  version: 1.0.0
  description: Internal API contract for Mango Parental Control Service. The service intentionally standardizes successful create, update, and delete operations on `200 OK`.
servers:
  - url: "https://{host}:{publicPort}"
    description: "Public HTTPS API Interface"
    variables:
      host:
        default: "localhost"
        description: "Hostname/IP of the public service"
      publicPort:
        default: "16008"
        description: "Public API interface port"
  - url: "https://{host}:{privatePort}"
    description: "Private/Internal HTTPS API Interface"
    variables:
      host:
        default: "localhost"
        description: "Hostname/IP of the private service"
      privatePort:
        default: "17008"
        description: "Private management/diagnostics port"
security:
  - PublicTokenAuth: []
  - PrivateInternalNameAuth: []
    PrivateApiKeyAuth: []
paths:
  /livez:
    get:
      summary: "Liveness probe"
      description: "Checks if the service is running and healthy. This route is unauthenticated and accessible on both the public and private ports."
      security: []
      responses:
        "200":
          description: "Service is healthy and running"
        "500":
          description: "Service is unhealthy"

  /api/v1/system:
    get:
      summary: "Retrieve system diagnostics and metrics"
      description: "Returns system status info or resource usage based on the requested command."
      security:
        - PrivateInternalNameAuth: []
          PrivateApiKeyAuth: []
      parameters:
        - name: "command"
          in: "query"
          required: true
          schema:
            type: "string"
            enum: ["info", "resources"]
      responses:
        "200":
          description: "Successful query execution"
        "400":
          description: "Invalid command query"
    post:
      summary: "Modify log levels or query diagnostics schema"
      description: "Dynamically mutate runtime subsystem log levels or fetch subsystem metadata."
      security:
        - PrivateInternalNameAuth: []
          PrivateApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: "object"
              required:
              - "command"
              properties:
                command:
                  type: "string"
                  enum: ["setloglevel", "getloglevels", "getloglevelnames", "getsubsystemnames"]
                subsystems:
                  type: "array"
                  items:
                    type: "object"
                    required:
                    - "tag"
                    - "value"
                    properties:
                      tag:
                        type: "string"
                      value:
                        type: "string"
      responses:
        "200":
          description: "Successful action execution"
        "400":
          description: "Invalid command or malformed body"

  /api/v1/subscribers/{subscriber_id}/groups:
    get:
      summary: List groups
      parameters:
        - $ref: '#/components/parameters/SubscriberIdPath'
      responses:
        '200':
          description: Group list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Group'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/StorageFailure' }
    post:
      summary: Create group
      description: Create a new group. Maximum of 20 groups allowed per subscriber. Exceeding this limit returns a 409 Conflict error. The response always contains the `config-raw` field, which will be `null` for no-op changes or populated if the effective policy state changes. Group creation stores group metadata only and does not create active device-side enforcement.
      parameters:
        - $ref: '#/components/parameters/SubscriberIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupCreateRequest'
      responses:
        '200':
          description: Group created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupWriteResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/StorageFailure' }
  /api/v1/subscribers/{subscriber_id}/groups/{group_id}:
    get:
      summary: Get group
      parameters:
        - $ref: '#/components/parameters/SubscriberIdPath'
        - $ref: '#/components/parameters/GroupIdPath'
      responses:
        '200':
          description: Group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/StorageFailure' }
    put:
      summary: Update group
      description: The response always contains the `config-raw` field, which will be populated only when the updated group changes effective device-side policy, or `null` for no-op changes (such as changing only `name` or `description`).
      parameters:
        - $ref: '#/components/parameters/SubscriberIdPath'
        - $ref: '#/components/parameters/GroupIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupPutRequest'
      responses:
        '200':
          description: Group updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupWriteResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/StorageFailure' }
    delete:
      summary: Delete group
      description: The response always contains the `config-raw` field. If deleting the group changes the remaining effective parental-control snapshot, `config-raw` contains the updated commands. If no parental-control-owned snapshot remains after the delete, `config-raw` is returned as an empty array `[]`. For no-op changes, it is returned as `null`.
      parameters:
        - $ref: '#/components/parameters/SubscriberIdPath'
        - $ref: '#/components/parameters/GroupIdPath'
      responses:
        '200':
          description: Group deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigRawResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/StorageFailure' }
  /api/v1/subscribers/{subscriber_id}/groups/{group_id}/devices:
    get:
      summary: List devices assigned to a group
      parameters:
        - $ref: '#/components/parameters/SubscriberIdPath'
        - $ref: '#/components/parameters/GroupIdPath'
      responses:
        '200':
          description: Group device assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GroupDevice'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/StorageFailure' }
    post:
      summary: Add device to group
      description: Assign a device (MAC address) to a group. One MAC address can belong to only one group per subscriber. Attempting to assign an already-assigned MAC to another group returns a 409 Conflict error. The response always contains the `config-raw` field, which will contain the updated commands if the effective policy snapshot changes, or `null` for no-op changes.
      parameters:
        - $ref: '#/components/parameters/SubscriberIdPath'
        - $ref: '#/components/parameters/GroupIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupDeviceCreateRequest'
      responses:
        '200':
          description: Device assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupDeviceWriteResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/StorageFailure' }
  /api/v1/subscribers/{subscriber_id}/groups/{group_id}/devices/{client_mac}:
    get:
      summary: Get a single device assignment
      parameters:
        - $ref: '#/components/parameters/SubscriberIdPath'
        - $ref: '#/components/parameters/GroupIdPath'
        - $ref: '#/components/parameters/ClientMacPath'
      responses:
        '200':
          description: Device assignment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupDevice'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/StorageFailure' }
    delete:
      summary: Remove device from group
      description: The response always contains the `config-raw` field. If removing the device changes the remaining effective parental-control snapshot, `config-raw` contains the updated commands. If no parental-control-owned snapshot remains after the delete, `config-raw` is returned as an empty array `[]`. For no-op changes, it is returned as `null`.
      parameters:
        - $ref: '#/components/parameters/SubscriberIdPath'
        - $ref: '#/components/parameters/GroupIdPath'
        - $ref: '#/components/parameters/ClientMacPath'
      responses:
        '200':
          description: Device removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigRawResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/StorageFailure' }
  /api/v1/subscribers/{subscriber_id}/schedules:
    get:
      summary: List schedules
      parameters:
        - $ref: '#/components/parameters/SubscriberIdPath'
      responses:
        '200':
          description: Schedule list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Schedule'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/StorageFailure' }
    post:
      summary: Create schedule
      description: Create a new schedule. Maximum of 20 schedules allowed per subscriber. Exceeding this limit returns a 409 Conflict error. The response always contains the `config-raw` field, which will be `null` for no-op changes or populated if the effective policy state changes. Schedule creation stores schedule data only and does not create active device-side enforcement until the schedule is linked to a group with devices.
      parameters:
        - $ref: '#/components/parameters/SubscriberIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleCreateRequest'
      responses:
        '200':
          description: Schedule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleWriteResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/StorageFailure' }
  /api/v1/subscribers/{subscriber_id}/schedules/{schedule_id}:
    get:
      summary: Get schedule
      parameters:
        - $ref: '#/components/parameters/SubscriberIdPath'
        - $ref: '#/components/parameters/ScheduleIdPath'
      responses:
        '200':
          description: Schedule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schedule'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/StorageFailure' }
    put:
      summary: Update schedule
      description: The response always contains the `config-raw` field, which will be populated only when the updated schedule changes effective device-side policy for linked groups with devices, or `null` for no-op changes.
      parameters:
        - $ref: '#/components/parameters/SubscriberIdPath'
        - $ref: '#/components/parameters/ScheduleIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchedulePutRequest'
      responses:
        '200':
          description: Schedule updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleWriteResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/StorageFailure' }
    delete:
      summary: Delete schedule
      description: The response always contains the `config-raw` field. If deleting the schedule changes the remaining effective parental-control snapshot, `config-raw` contains the updated commands. If no parental-control-owned snapshot remains after the delete, `config-raw` is returned as an empty array `[]`. For no-op changes, it is returned as `null`.
      parameters:
        - $ref: '#/components/parameters/SubscriberIdPath'
        - $ref: '#/components/parameters/ScheduleIdPath'
      responses:
        '200':
          description: Schedule deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigRawResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/StorageFailure' }
  /api/v1/subscribers/{subscriber_id}/groups/{group_id}/schedules:
    get:
      summary: List group-schedule links
      parameters:
        - $ref: '#/components/parameters/SubscriberIdPath'
        - $ref: '#/components/parameters/GroupIdPath'
      responses:
        '200':
          description: Group-schedule links
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Schedule'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/StorageFailure' }
    post:
      summary: Link schedule to group
      description: The response always contains the `config-raw` field, which will contain the updated commands if the group has devices and the linked schedule is enabled, or `null` for no-op changes.
      parameters:
        - $ref: '#/components/parameters/SubscriberIdPath'
        - $ref: '#/components/parameters/GroupIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupScheduleLinkRequest'
      responses:
        '200':
          description: Schedule linked to group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupScheduleWriteResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/StorageFailure' }
    put:
      summary: Replace schedules linked to group
      description: The response always contains the `config-raw` field, which will contain the updated commands if the replacement changes the effective parental-control snapshot for the group, or `null` for no-op changes.
      parameters:
        - $ref: '#/components/parameters/SubscriberIdPath'
        - $ref: '#/components/parameters/GroupIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupScheduleReplaceRequest'
      responses:
        '200':
          description: Group schedule links replaced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupScheduleReplaceResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/StorageFailure' }
  /api/v1/subscribers/{subscriber_id}/groups/{group_id}/schedules/{schedule_id}:
    get:
      summary: Get a single group-schedule link
      parameters:
        - $ref: '#/components/parameters/SubscriberIdPath'
        - $ref: '#/components/parameters/GroupIdPath'
        - $ref: '#/components/parameters/ScheduleIdPath'
      responses:
        '200':
          description: Group-schedule link
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupScheduleLink'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/StorageFailure' }
    delete:
      summary: Unlink schedule from group
      description: The response always contains the `config-raw` field. If unlinking changes the remaining effective parental-control snapshot, `config-raw` contains the updated commands. If no parental-control-owned snapshot remains after the unlink, `config-raw` is returned as an empty array `[]`. For no-op changes, it is returned as `null`.
      parameters:
        - $ref: '#/components/parameters/SubscriberIdPath'
        - $ref: '#/components/parameters/GroupIdPath'
        - $ref: '#/components/parameters/ScheduleIdPath'
      responses:
        '200':
          description: Group schedule link removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigRawResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/StorageFailure' }
components:
  securitySchemes:
    PublicTokenAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Bearer authentication token for Public API interface endpoints."
    PrivateInternalNameAuth:
      type: apiKey
      in: header
      name: X-INTERNAL-NAME
      description: "Internal identifier header required on the Private API interface."
    PrivateApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY
      description: "API Key authorization header required on the Private API interface."
  parameters:
    SubscriberIdPath:
      name: subscriber_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    GroupIdPath:
      name: group_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ScheduleIdPath:
      name: schedule_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ClientMacPath:
      name: client_mac
      in: path
      required: true
      schema:
        type: string
        pattern: '^([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}$'
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    StorageFailure:
      description: Storage failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    Group:
      type: object
      required: [id, subscriber_id, group_config_index, name, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        subscriber_id:
          type: string
          format: uuid
        group_config_index:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    GroupCreateRequest:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
    GroupPutRequest:
      type: object
      additionalProperties: false
      description: Full replacement request for mutable group fields. `PUT` requests must send the complete mutable group representation.
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
    GroupDevice:
      type: object
      required: [subscriber_id, group_id, client_mac, created_at, updated_at]
      properties:
        subscriber_id:
          type: string
          format: uuid
        group_id:
          type: string
          format: uuid
        client_mac:
          type: string
          pattern: '^([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}$'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    GroupDeviceCreateRequest:
      type: object
      additionalProperties: false
      required: [client_mac]
      properties:
        client_mac:
          type: string
          pattern: '^([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}$'
    Schedule:
      type: object
      required: [id, subscriber_id, schedule_config_index, name, enabled, action_type, target_kind, start_minute, stop_minute, weekdays, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        subscriber_id:
          type: string
          format: uuid
        schedule_config_index:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        enabled:
          type: boolean
        action_type:
          type: string
          enum: [BLOCK]
        target_kind:
          type: string
          enum: [INTERNET, APP]
        target_value:
          type: string
          nullable: true
        start_minute:
          type: integer
          minimum: 0
          maximum: 1439
        stop_minute:
          type: integer
          minimum: 0
          maximum: 1439
        weekdays:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: integer
            minimum: 0
            maximum: 6
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ScheduleCreateInternetRequest:
      type: object
      additionalProperties: false
      required: [name, action_type, target_kind, start_minute, stop_minute, weekdays]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        enabled:
          type: boolean
          default: true
        action_type:
          type: string
          enum: [BLOCK]
        target_kind:
          type: string
          enum: [INTERNET]
        target_value:
          type: string
          nullable: true
          description: Must be `null` or omitted entirely when `target_kind = INTERNET`.
        start_minute:
          type: integer
          minimum: 0
          maximum: 1439
        stop_minute:
          type: integer
          minimum: 0
          maximum: 1439
        weekdays:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: integer
            minimum: 0
            maximum: 6
    ScheduleCreateAppRequest:
      type: object
      additionalProperties: false
      required: [name, action_type, target_kind, target_value, start_minute, stop_minute, weekdays]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        enabled:
          type: boolean
          default: true
        action_type:
          type: string
          enum: [BLOCK]
        target_kind:
          type: string
          enum: [APP]
        target_value:
          type: string
          minLength: 1
          description: Required application identifier when `target_kind = APP`. For Phase 1, only "YOUTUBE" is supported (case-insensitive).
        start_minute:
          type: integer
          minimum: 0
          maximum: 1439
        stop_minute:
          type: integer
          minimum: 0
          maximum: 1439
        weekdays:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: integer
            minimum: 0
            maximum: 6
    ScheduleCreateRequest:
      description: Create request. INTERNET schedules must omit `target_value` or send `target_value = null`. APP schedules must send a non-empty `target_value`. `start_minute` and `stop_minute` must not be equal. `weekdays` values must be distinct. Schedule times are interpreted in the gateway/router local timezone.
      oneOf:
        - $ref: '#/components/schemas/ScheduleCreateInternetRequest'
        - $ref: '#/components/schemas/ScheduleCreateAppRequest'
    SchedulePutInternetRequest:
      type: object
      additionalProperties: false
      required: [name, enabled, action_type, target_kind, start_minute, stop_minute, weekdays]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        enabled:
          type: boolean
        action_type:
          type: string
          enum: [BLOCK]
        target_kind:
          type: string
          enum: [INTERNET]
        target_value:
          type: string
          nullable: true
          description: Must be `null` or omitted entirely when `target_kind = INTERNET`.
        start_minute:
          type: integer
          minimum: 0
          maximum: 1439
        stop_minute:
          type: integer
          minimum: 0
          maximum: 1439
        weekdays:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: integer
            minimum: 0
            maximum: 6
    SchedulePutAppRequest:
      type: object
      additionalProperties: false
      required: [name, enabled, action_type, target_kind, target_value, start_minute, stop_minute, weekdays]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        enabled:
          type: boolean
        action_type:
          type: string
          enum: [BLOCK]
        target_kind:
          type: string
          enum: [APP]
        target_value:
          type: string
          minLength: 1
          description: Required application identifier when `target_kind = APP`. For Phase 1, only "YOUTUBE" is supported (case-insensitive).
        start_minute:
          type: integer
          minimum: 0
          maximum: 1439
        stop_minute:
          type: integer
          minimum: 0
          maximum: 1439
        weekdays:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: integer
            minimum: 0
            maximum: 6
    SchedulePutRequest:
      description: Full replacement request. `PUT` requests must send the complete mutable schedule representation. `start_minute` and `stop_minute` must not be equal. `weekdays` values must be distinct. Schedule times are interpreted in the gateway/router local timezone.
      oneOf:
        - $ref: '#/components/schemas/SchedulePutInternetRequest'
        - $ref: '#/components/schemas/SchedulePutAppRequest'
    GroupScheduleLink:
      type: object
      required: [subscriber_id, group_id, schedule_id, created_at]
      properties:
        subscriber_id:
          type: string
          format: uuid
        group_id:
          type: string
          format: uuid
        schedule_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
    GroupScheduleLinkRequest:
      type: object
      additionalProperties: false
      required: [schedule_id]
      properties:
        schedule_id:
          type: string
          format: uuid
    GroupScheduleReplaceRequest:
      type: object
      additionalProperties: false
      required: [schedule_ids]
      properties:
        schedule_ids:
          type: array
          uniqueItems: true
          items:
            type: string
            format: uuid
    ConfigRawCommand:
      type: array
      minItems: 2
      maxItems: 3
      description: Ordered config-raw command tuple. Tuple ordering in the response must be deterministic for identical effective subscriber policy state.
      items:
        type: string
    ConfigRawResponse:
      type: object
      description: Successful write response extension. Write operations return `200 OK`. The `config-raw` property is always present in the response (either as `null` for no-op changes, an empty array `[]` when policy is cleared, or a populated array containing the full parental-control-owned snapshot). Command tuple shape follows the upstream schema reference at `https://github.com/Telecominfraproject/wlan-ucentral-schema/blob/main/schema/config-raw.yml`.
      properties:
        config-raw:
          type: array
          minItems: 0
          nullable: true
          description: Ordered full parental-control command snapshot. This property is always present in the response. Depending on the write result, it will be `null` (for no-op changes), an empty array `[]` (to signal that all parental-control-owned sections should be cleared on the device), or a populated array containing every active parental-control-owned command. Commands shall be emitted deterministically for identical stored subscriber policy state, with group rendering ordered by `group_config_index`, schedule rendering ordered by `schedule_config_index`, and MAC lists ordered by normalized ascending MAC value.
          items:
            $ref: '#/components/schemas/ConfigRawCommand'
    GroupWriteResponse:
      description: Group write response. Always includes `config-raw` through `ConfigRawResponse` (which is `null` for no-op changes, `[]` when policy is cleared, or the populated array of commands).
      allOf:
        - $ref: '#/components/schemas/ConfigRawResponse'
        - $ref: '#/components/schemas/Group'
    GroupDeviceWriteResponse:
      description: Group-device write response. Always includes `config-raw` through `ConfigRawResponse` (which is `null` for no-op changes, `[]` when policy is cleared, or the populated array of commands).
      allOf:
        - $ref: '#/components/schemas/ConfigRawResponse'
        - $ref: '#/components/schemas/GroupDevice'
    ScheduleWriteResponse:
      description: Schedule write response. Always includes `config-raw` through `ConfigRawResponse` (which is `null` for no-op changes, `[]` when policy is cleared, or the populated array of commands).
      allOf:
        - $ref: '#/components/schemas/ConfigRawResponse'
        - $ref: '#/components/schemas/Schedule'
    GroupScheduleWriteResponse:
      description: Group-schedule write response. Always includes `config-raw` through `ConfigRawResponse` (which is `null` for no-op changes, `[]` when policy is cleared, or the populated array of commands).
      allOf:
        - $ref: '#/components/schemas/ConfigRawResponse'
        - $ref: '#/components/schemas/GroupScheduleLink'
    GroupScheduleReplaceResponse:
      description: Group-schedule replace response. Always includes `config-raw` through `ConfigRawResponse` (which is `null` for no-op changes, `[]` when policy is cleared, or the populated array of commands).
      allOf:
        - $ref: '#/components/schemas/ConfigRawResponse'
        - type: object
          properties:
            links:
              type: array
              items:
                $ref: '#/components/schemas/GroupScheduleLink'
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
