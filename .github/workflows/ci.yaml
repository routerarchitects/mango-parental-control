name: Go Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go Environment
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Verify Module Dependencies
        run: |
          go mod download
          go mod verify

      - name: Verify Module Consistency
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Check Code Formatting
        run: |
          unformatted=$(find . -name "*.go" -not -path "*/vendor/*" -not -path "*/tmp_test/*" -print0 | xargs -0 -r gofmt -l)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted properly:"
            echo "$unformatted"
            echo "Please run 'gofmt -w .' on your local files."
            exit 1
          fi

      - name: Run Static Analysis (go vet)
        run: go vet ./...

      - name: Validate OpenAPI Specification
        run: npx -y @redocly/cli lint docs/phase-1/openapi.yaml

      - name: Run Unit and Integration Tests
        run: |
          # Mock the required environment variables enforced by the discovery and logger libraries
          export SERVICE_NAME="mango-parental-control"
          export SERVICE_TYPE="mango-parental-control"
          export SERVICE_VERSION="dev"
          export SYSTEM_URI_PRIVATE="https://localhost:17008"
          export SYSTEM_URI_PUBLIC="https://localhost:16008"
          export DISCOVERY_TOPIC="service_events"
          export STORAGE_TYPE=postgresql
          export STORAGE_TYPE_POSTGRESQL_HOST=127.0.0.1
          export STORAGE_TYPE_POSTGRESQL_PORT=5432
          export STORAGE_TYPE_POSTGRESQL_USERNAME=postgres
          export STORAGE_TYPE_POSTGRESQL_PASSWORD=postgres
          export STORAGE_TYPE_POSTGRESQL_DATABASE=postgres
          export STORAGE_TYPE_POSTGRESQL_SSLMODE=disable
          
          go test -v -race ./...

      - name: Build Service Binary
        run: |
          make build
