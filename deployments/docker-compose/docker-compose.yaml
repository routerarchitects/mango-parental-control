# ==============================================================================
# OpenWiFi docker-compose.yml Integration Template
# Merge the service block below into the "services:" block of the main deployment:
# /openwifi-sdk/mango-cloud-deployment/docker-compose/docker-compose.yml
# ==============================================================================

version: '3.8'

services:
  mango-parental-control:
    image: mango-parental-control:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openwifi_mango-parental-control
    networks:
      openwifi:
        aliases:
          - mango-parental-control.wlan.local
    env_file:
      - mango-parental-control.env
    depends_on:
      init-kafka:
        condition: service_completed_successfully
      postgresql:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      # Data directory for SQL state, logs, and uploads
      - "./mango-parental-control_data:/app/data"
      # Share SSL/TLS certificates mounted from the compose folder
      - "./certs:/app/certs"
    ports:
      - "16008:16008"
      - "17008:17008"
